name: Uppdatera Strava-data

on:
  # Schemat borttaget 2026-07-14 — projektet är pausat. Återaktivera den dagliga
  # körningen genom att lägga tillbaka:
  #   schedule:
  #     - cron: '0 5 * * *'
  # (Widgeten visar bara ~5 aktiviteter, så körningen måste vara daglig.)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: strava-data-pipeline
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checka ut repot
        uses: actions/checkout@v4

      - name: Installera Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installera beroenden
        run: npm ci

      - name: Hämta widget-data (plan B)
        run: node scripts/scrape.mjs

      - name: Aggregera veckostatistik
        run: node scripts/aggregate.mjs

      - name: Committa uppdaterad data
        run: |
          git config user.name "gasellerna-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Inga nya data denna körning."
          else
            git commit -m "Uppdatera klubbdata $(date -u +%Y-%m-%d)"
            git push
          fi
